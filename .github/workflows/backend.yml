name: Backend CI

on:
  push:
    paths:
      - 'backend/**'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Test Import
        run: |
          cd backend
          python -c "from app.main import app"
          